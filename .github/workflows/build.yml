name: Build Geode Mod

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.config.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - target: win
          - target: android64
          - target: android32

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: v5.6.1
          target: ${{ matrix.config.target }}
          build-config: RelWithDebInfo
          export-pdb: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.target }}-build
          path: |
            build/*.geode
            build/*.pdb
          if-no-files-found: ignore

  package:
    name: Package combined .geode
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Find and display .geode files
        run: |
          find artifacts/ -name "*.geode" | while read f; do
            echo "Found: $f"
          done

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: Xd-rework-all-platforms
          path: artifacts/**/*.geode
          if-no-files-found: warn
