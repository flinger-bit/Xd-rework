name: Build Geode Mod

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.config.target }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - target: Win64
            os: windows-latest
          - target: Android64
            os: ubuntu-latest
          - target: Android32
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: v5.6.1
          target: ${{ matrix.config.target }}
          build-config: RelWithDebInfo
          export-pdb: true
          combine: true
          use-cpm-cache: false
          ccache-variant: ""

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.target }}-build
          path: build/*.geode
          if-no-files-found: ignore

  package:
    name: Package combined .geode
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Merge .geode files
        uses: geode-sdk/build-geode-mod/merge@main
        with:
          path: artifacts/

      - name: Upload final .geode
        uses: actions/upload-artifact@v4
        with:
          name: Xd-rework
          path: "*.geode"
          if-no-files-found: warn
