name: Build Geode Mod

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.config.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - target: Android64
          - target: Android32

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: v5.6.1
          target: ${{ matrix.config.target }}
          build-config: RelWithDebInfo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.target }}-build
          path: build/*.geode
          if-no-files-found: warn

  package:
    name: Package combined .geode
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Android64 build
        uses: actions/download-artifact@v4
        with:
          name: Android64-build
          path: out/

      - name: Download Android32 build
        uses: actions/download-artifact@v4
        with:
          name: Android32-build
          path: tmp32/

      - name: Merge Android32 binary into Android64 .geode
        run: |
          GEODE=$(ls out/*.geode | head -1)
          SO32=$(find tmp32/ -name "*.so" | head -1)
          if [ -n "$SO32" ] && [ -n "$GEODE" ]; then
            echo "Merging $SO32 into $GEODE"
            zip -j "$GEODE" "$SO32"
          fi
          ls -lh out/

      - name: Upload final .geode
        uses: actions/upload-artifact@v4
        with:
          name: Xd-rework
          path: out/*.geode
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download packaged .geode
        uses: actions/download-artifact@v4
        with:
          name: Xd-rework
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: changelog.md
          files: release/*.geode
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
